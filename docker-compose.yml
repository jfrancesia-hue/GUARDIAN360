version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${DB_NAME:-guardian360}
      POSTGRES_USER: ${DB_USER:-guardian}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-guardian_local}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-guardian} -d ${DB_NAME:-guardian360}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-guardian_redis}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-guardian}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-guardian_minio}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./infrastructure/docker/mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
    ports:
      - "1883:1883"
      - "9883:9883"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./infrastructure/docker/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-guardian_grafana}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/docker/grafana-dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3030:3000"

  backend-nestjs:
    build:
      context: .
      dockerfile: apps/backend-nestjs/Dockerfile
      target: development
    depends_on:
      - postgres
      - redis
      - minio
      - mosquitto
    environment:
      DATABASE_URL: postgresql://${DB_USER:-guardian}:${DB_PASSWORD:-guardian_local}@postgres:5432/${DB_NAME:-guardian360}
      REDIS_URL: redis://:${REDIS_PASSWORD:-guardian_redis}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MQTT_BROKER: mqtt://mosquitto:1883
      JWT_SECRET: ${JWT_SECRET:-change_me_min_32_chars_local_dev}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_min_32_chars_local_dev}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      NODE_ENV: development
      API_PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./apps/backend-nestjs:/repo/apps/backend-nestjs
      - /repo/node_modules
      - /repo/apps/backend-nestjs/node_modules

  backend-laravel:
    build:
      context: ./apps/backend-laravel
    depends_on:
      - postgres
      - redis
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_DATABASE: ${DB_NAME:-guardian360}
      DB_USERNAME: ${DB_USER:-guardian}
      DB_PASSWORD: ${DB_PASSWORD:-guardian_local}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-guardian_redis}
      APP_ENV: local
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend-laravel:/var/www/html

  vision-ai:
    build:
      context: ./apps/ai-services/vision-ai
    depends_on:
      - redis
      - minio
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-guardian_redis}@redis:6379
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8001:8001"
    volumes:
      - ./apps/ai-services/vision-ai:/app
      - ai_models:/app/models_weights

  satellite-patrol:
    build:
      context: ./apps/ai-services/satellite-patrol
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: postgresql://${DB_USER:-guardian}:${DB_PASSWORD:-guardian_local}@postgres:5432/${DB_NAME:-guardian360}
      REDIS_URL: redis://:${REDIS_PASSWORD:-guardian_redis}@redis:6379
      MINIO_ENDPOINT: minio:9000
      SENTINEL_HUB_CLIENT_ID: ${SENTINEL_HUB_CLIENT_ID:-}
      SENTINEL_HUB_CLIENT_SECRET: ${SENTINEL_HUB_CLIENT_SECRET:-}
    ports:
      - "8002:8002"
    volumes:
      - ./apps/ai-services/satellite-patrol:/app
      - satellite_data:/data

  dashboard-web:
    build:
      context: .
      dockerfile: apps/dashboard-web/Dockerfile
      target: development
    depends_on:
      - backend-nestjs
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXT_PUBLIC_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/dashboard-web:/repo/apps/dashboard-web
      - /repo/node_modules
      - /repo/apps/dashboard-web/node_modules
      - /repo/apps/dashboard-web/.next

volumes:
  pg_data:
  redis_data:
  minio_data:
  mosquitto_data:
  grafana_data:
  ai_models:
  satellite_data:
